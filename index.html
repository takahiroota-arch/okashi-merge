<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>おかしまーじ！｜60秒タイムアタック</title>
<meta name="description" content="お菓子を落として合体させる60秒の可愛い物理マージゲーム。">
<meta property="og:title" content="おかしまーじ！｜60秒タイムアタック">
<meta property="og:description" content="お菓子を落として合体させる60秒の可愛い物理マージゲーム。">
<meta property="og:type" content="website">
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap');
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{height:100dvh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:#ffd9e6;font-family:'M PLUS Rounded 1c',sans-serif;padding:6px;}
  #m-stage{display:flex;flex-direction:column;align-items:center;gap:8px;transform-origin:center center;}
  #m-title{font-size:20px;font-weight:700;color:#ff3d77;text-align:center;}
  #m-title.hasimg #m-titletext{display:none;}
  #m-titleimg{max-width:300px;max-height:130px;display:block;margin:0 auto;}
  #m-foot{font-size:11px;color:#c98aa3;text-align:center;}
  #m-credit{font-size:9px;color:#d8a8bb;text-align:center;letter-spacing:.02em;margin-top:-2px;}
  #m-wrap{background:#ffe3ee;border-radius:20px;padding:13px;width:100%;max-width:340px;position:relative;color:#8a5a6b;}
  #m-wrap.fever{box-shadow:0 0 0 4px #ffd23f;}
  #m-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  #m-sub{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;min-height:34px;}
  #m-mai{display:flex;align-items:center;gap:7px;}
  #m-face{font-size:28px;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex:none;}
  #m-face.hasimg{width:50px;height:50px;background-size:contain;background-repeat:no-repeat;background-position:center;font-size:0;}
  #m-speech{position:relative;background:#fff;border:2px solid #ffd0e0;border-radius:12px;padding:5px 11px;
    font-size:12px;color:#d2477f;max-width:150px;line-height:1.3;font-weight:700;}
  #m-speech::before{content:'';position:absolute;left:1px;top:50%;width:11px;height:11px;background:#fff;
    border-left:2px solid #ffd0e0;border-bottom:2px solid #ffd0e0;transform:translate(-50%,-50%) rotate(45deg);}
  #m-score{font-size:28px;font-weight:700;color:#ff2d6f;transition:transform .08s;line-height:1;
    text-shadow:0 0 2px #fff,1.5px 1.5px 0 #fff,-1.5px 1.5px 0 #fff,1.5px -1.5px 0 #fff,-1.5px -1.5px 0 #fff;}
  #m-timer{display:inline-flex;align-items:center;font-size:27px;font-weight:700;color:#ff7a1a;
    background:#fff3e0;padding:3px 16px;border-radius:999px;}
  #m-timer.low{color:#fff;background:#e8434f;animation:tpulse .45s infinite;}
  @keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
  #m-fever{display:none;align-items:center;font-size:13px;font-weight:700;color:#fff;background:#ff3d77;
    padding:2px 10px;border-radius:999px;animation:feverpulse .4s infinite alternate;}
  #m-fever.hint{background:#ff8a2b;}
  @keyframes feverpulse{from{transform:scale(1)}to{transform:scale(1.14)}}
  #m-reqs{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-flow:dense;gap:4px;margin-bottom:8px;min-height:46px;align-items:end;}
  .m-req{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0;}
  .m-pts{font-size:10px;font-weight:700;white-space:nowrap;}
  .m-chip{position:relative;width:100%;height:30px;display:flex;align-items:center;justify-content:center;border-radius:10px;
    background:#fff;border:2.5px solid #ffb3cf;font-size:17px;line-height:1;overflow:hidden;}
  .m-chipimg{width:22px;height:22px;object-fit:contain;display:block;}
  .m-bar{position:absolute;left:0;bottom:0;height:3px;background:#7ddca4;width:100%;}
  #m-canvas{width:100%;display:block;border-radius:14px;background:#fff5fa;cursor:pointer;touch-action:none;}
  #m-chain{display:flex;flex-wrap:nowrap;align-items:center;justify-content:center;gap:1px;margin-top:9px;font-size:15px;}
  .m-arrow{color:#ff8ab0;font-size:11px;font-weight:700;margin:0 1px;}
  .m-chimg{width:18px;height:18px;object-fit:contain;vertical-align:middle;}
  #m-cutin{position:absolute;left:0;right:0;top:34%;height:170px;background-size:contain;background-repeat:no-repeat;
    background-position:center;opacity:0;pointer-events:none;z-index:6;}
  #m-cutin.show{animation:cutin 1.25s ease;}
  @keyframes cutin{0%{opacity:0;transform:translateX(-55%) scale(.7)}16%{opacity:1;transform:translateX(0) scale(1.06)}
    72%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(38%) scale(.95)}}
  #m-overlay{position:absolute;inset:0;background:rgba(120,55,85,.78);border-radius:20px;display:none;
    flex-direction:column;align-items:center;justify-content:center;z-index:5;}
  #m-ocard{background:#fff;border:3px solid #ffd0e0;border-radius:22px;padding:18px 26px;display:flex;flex-direction:column;align-items:center;gap:6px;}
  #m-oemoji{font-size:46px;line-height:1;}
  #m-omsg{font-size:18px;font-weight:700;color:#ff3d77;text-align:center;}
  #m-otitle{font-size:15px;font-weight:700;color:#8a5a00;background:#fff0c2;border:2px solid #ffd86b;padding:4px 14px;border-radius:999px;text-align:center;}
  #m-orank{font-size:13px;font-weight:700;color:#b06bff;text-align:center;}
  #m-oscorewrap{display:flex;flex-direction:column;align-items:center;background:#fff0f5;border-radius:14px;padding:7px 24px;margin-top:2px;}
  .m-oslabel{font-size:11px;color:#b07089;font-weight:500;}
  #m-oscore{font-size:30px;font-weight:700;color:#ff2d6f;}
  .m-again{margin-top:6px;background:#ff4d88;color:#fff;border:none;border-radius:13px;height:44px;padding:0 26px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;}
</style>
</head>
<body>
<div id="m-stage">
<div id="m-wrap">
  <div id="m-hud">
    <div id="m-score">0</div>
    <div id="m-timer">⏱ 120</div>
  </div>
  <div id="m-sub">
    <div id="m-mai"><div id="m-face">🐰</div><div id="m-speech">よ〜い…！</div></div>
    <div id="m-fever">🔥×2</div>
  </div>
  <div id="m-reqs"></div>
  <canvas id="m-canvas" width="300" height="440"></canvas>
  <div id="m-chain"></div>
  <div id="m-cutin"></div>
  <div id="m-overlay"><div id="m-ocard">
    <div id="m-oemoji">🎉</div><div id="m-omsg"></div><div id="m-otitle"></div>
    <div id="m-oscorewrap"><span class="m-oslabel">スコア</span><span id="m-oscore">0</span></div>
    <button class="m-again" id="m-again">もういちど あそぶ</button>
  </div></div>
</div>
<div id="m-foot">タップで落下／同じお菓子が合体／🥄スプーンは3つ集めてどかそう！</div>
<div id="m-credit">ver 1.0　©︎ 2026 TAKAHIRO OTA ／ KASSEN inc.</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
(function(){
  const cv=document.getElementById('m-canvas'),ctx=cv.getContext('2d');
  const W=300,H=440,LINE=56,GAMETIME=120,CAP=7,FEVERWIN=3500,FEVERDUR=5000,GOLDP=0.07,OBSTP=0.07,OBW=63,OBH=108,SETTLE=2.6;
  const DPR=Math.min(window.devicePixelRatio||1,2.5);
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.scale(DPR,DPR);
  const EMOJI=['🍬','🍪','🧁','🍩','🍰','🍮','🍦','🎂'];
  const COL=['#ffd1dc','#caa06a','#f7c977','#df9457','#ffb3c6','#e6c061','#bfe3ff','#ff8fab'];
  const RAD=[15,24,30,38,47,57,69,83];
  const PARTYCOL=['#ff4d88','#ffd864','#7ddca4','#7ec8ff','#c89bff','#ffa552'];
  const GOLDCOL=['#ffd23f','#fff2b0','#ffe27a','#ffcf2e'];
  const CRAVE={3:'ドーナツ ちょうだい！',4:'ケーキ たべたい！',5:'プリン ほしい〜！'};
  const TITLES=[[0,'おかしみならい'],[2000,'おやつたんけんたい'],[5000,'くっきーこねこね係'],[9000,'すいーつあつめ隊'],[14000,'おかしづくり名人'],[20000,'ほかほかパティシエ'],[27000,'にこにこケーキ職人'],[35000,'ふわふわスイーツ博士'],[44000,'しあわせおやつ研究家'],[54000,'きらきらパティシエ'],[65000,'ごほうびスイーツマスター'],[78000,'おかしのまほうつかい'],[92000,'でんせつのパティシエ'],[108000,'スイーツキング'],[125000,'おかしの神さま']];
  const FONT="'M PLUS Rounded 1c', sans-serif";
  // ===== イラスト読み込み（無ければ絵文字/手描きにフォールバック）=====
  const IMG={};
  const MAID={'🐰':'normal','😊':'happy','😄':'happy','😌':'happy','😆':'excited','🤩':'excited','🥳':'excited','😻':'love','😳':'nervous','😢':'sad','😤':'determined'};
  function loadImg(key,src){const im=new Image();im.onload=function(){IMG[key]=im;
    if(key.slice(0,5)==='candy'){if(typeof requests!=='undefined'&&requests)renderReqs();renderChain();}
    if(key.slice(0,5)==='maid_')setFace(lastFace);};im.onerror=function(){};im.src=src;}
  for(let i=0;i<8;i++)loadImg('candy'+i,'assets/candy_'+i+'.png');
  ['normal','happy','excited','love','nervous','sad','determined'].forEach(k=>loadImg('maid_'+k,'assets/maid_'+k+'.png'));
  loadImg('spoon','assets/spoon.png');
  loadImg('title','assets/title.png');
  ['fever','clear'].forEach(k=>loadImg('cutin_'+k,'assets/cutin_'+k+'.png'));

  const {Engine,Composite,Bodies,Body,Events}=Matter;
  let engine,world,bursts,parts,pops,score,combo,lastMerge,curTier,nextTier,curGolden,nextGolden,curObst,nextObst,pointerX,canDrop,over,pending,requests;
  let startT,started,cdStart,cdLast,cdText,timeLeft,lastSec,begun;
  let feverActive,feverEnd,fulfillStreak,lastFulfillT,feverTimer;
  let spurtOn,lastReact,lastCraving,burstCombo;
  let shake=0,flash=0,flashCol='#ffd23f',scorePulse=0,lastFace='🐰';

  function blocksOf(t){return t<=3?1:(t===4?2:3);}
  function scoreOf(t){return t*t*20;}
  function timeOf(b){return [0,3,5,8][b];}
  function durOf(b){return [0,9000,14000,20000][b];}
  function mult(){return feverActive?2:1;}
  function spurtMul(){return (started&&!over&&timeLeft<=10)?2:1;}
  function titleOf(s){let i=0;for(let k=0;k<TITLES.length;k++){if(s>=TITLES[k][0])i=k;}return {lv:i+1,name:TITLES[i][1]};}

  let AC=null,abus=null,bgm=null,bgmFever=null,bgmEnd=null;
  function actx(){if(AC)return AC;try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
    abus=AC.createGain();abus.gain.value=1;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=7200;lp.Q.value=0.5;
    const dly=AC.createDelay(0.6);dly.delayTime.value=0.15;
    const fb=AC.createGain();fb.gain.value=0.27;const wet=AC.createGain();wet.gain.value=0.38;
    abus.connect(lp);lp.connect(AC.destination);
    lp.connect(dly);dly.connect(fb);fb.connect(dly);dly.connect(wet);wet.connect(AC.destination);
    return AC;}
  function tone(freq,dur,type,vol,when){const c=actx();if(!c)return;const t=c.currentTime+(when||0);
    const o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol||0.09,t+0.025);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(abus);o.start(t);o.stop(t+dur+0.06);}
  function blip(f0,f1,dur,type,vol,when){const c=actx();if(!c)return;const t=c.currentTime+(when||0);
    const o=c.createOscillator(),g=c.createGain();o.type=type||'sine';
    o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(60,f1),t+dur);
    g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol||0.08,t+0.018);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(abus);o.start(t);o.stop(t+dur+0.06);}
  const SE={};
  function loadSE(key,src){const a=new Audio();a.preload='auto';a.ok=false;
    a.addEventListener('canplaythrough',()=>{a.ok=true;});a.addEventListener('error',()=>{a.ok=false;});a.src=src;SE[key]=a;}
  ['drop','merge','fulfill','win','over','tick','fever','golden','clear','anticip'].forEach(k=>loadSE(k,'assets/se_'+k+'.mp3'));
  function playSE(key,vol){const a=SE[key];if(a&&a.ok){try{const c=a.cloneNode();c.volume=vol==null?0.5:vol;c.play().catch(()=>{});return true;}catch(e){}}return false;}
  function sMerge(tier){if(playSE('merge'))return;const b=920+tier*95+Math.min(combo,9)*30;blip(b,b*1.5,0.15,'sine',0.075);}
  function sDrop(){if(playSE('drop',0.5))return;blip(900,1350,0.12,'sine',0.085);}
  function sFulfill(){if(playSE('fulfill'))return;[0,5,9,12].forEach((n,i)=>blip(1175*Math.pow(2,n/12),1175*Math.pow(2,n/12)*1.18,0.17,'triangle',0.062,i*0.07));}
  function sWin(){if(playSE('win'))return;[0,4,7,12,16,19].forEach((n,i)=>tone(988*Math.pow(2,n/12),0.22,'triangle',0.07,i*0.1));}
  function sOver(){if(playSE('over'))return;[0,-2,-5,-9].forEach((n,i)=>tone(587*Math.pow(2,n/12),0.3,'sine',0.07,i*0.13));}
  function sTick(){if(playSE('tick',0.5))return;blip(1320,1720,0.08,'sine',0.075);}
  function sFever(){if(playSE('fever'))return;[0,7,12,16,19].forEach((n,i)=>blip(988*Math.pow(2,n/12),988*Math.pow(2,n/12)*1.1,0.18,'triangle',0.07,i*0.06));}
  function sGolden(){if(playSE('golden'))return;[0,7,12,16,19].forEach((n,i)=>tone(1318*Math.pow(2,n/12),0.16,'sine',0.06,i*0.05));}
  function sClear(){if(playSE('clear'))return;[12,7,4,0].forEach((n,i)=>blip(1100*Math.pow(2,n/12),1100*Math.pow(2,n/12)*1.12,0.14,'triangle',0.062,i*0.06));}
  function sAnticip(){if(playSE('anticip'))return;[0,4,7,12].forEach((n,i)=>blip(1046*Math.pow(2,n/12),1046*Math.pow(2,n/12)*1.15,0.12,'sine',0.062,i*0.06));}
  function loadAudio(src,vol){const a=new Audio();a.loop=true;a.volume=vol;a.ok=false;
    a.addEventListener('canplaythrough',()=>{a.ok=true;});a.addEventListener('error',()=>{a.ok=false;});a.src=src;return a;}
  bgm=loadAudio('assets/bgm.mp3',0.3);bgmFever=loadAudio('assets/bgm_fever.mp3',0.38);bgmEnd=loadAudio('assets/bgm_end.mp3',0.32);
  function playBGM(){if(bgm&&bgm.ok&&started&&!over&&!(feverActive&&bgmFever&&bgmFever.ok))bgm.play().catch(()=>{});}
  function stopBGM(){if(bgm)bgm.pause();if(bgmFever)bgmFever.pause();}
  function playEnd(){if(bgmEnd&&bgmEnd.ok){bgmEnd.currentTime=0;bgmEnd.play().catch(()=>{});}}
  function startFeverBGM(){
    if(bgmFever&&bgmFever.ok){if(bgm)bgm.pause();bgmFever.currentTime=0;bgmFever.play().catch(()=>{});return;}
    let i=0;const seq=[0,4,7,12,7,4,9,12];
    feverTimer=setInterval(()=>{if(!feverActive){clearInterval(feverTimer);feverTimer=null;return;}
      tone(988*Math.pow(2,seq[i%seq.length]/12),0.16,'triangle',0.045);
      if(i%2===0)tone(494,0.18,'sine',0.04);i++;},170);}

  function cutin(key){const im=IMG['cutin_'+key];if(!im)return;const el=document.getElementById('m-cutin');
    el.style.backgroundImage="url('assets/cutin_"+key+".png')";el.classList.remove('show');void el.offsetWidth;el.classList.add('show');}

  function rnd(){return Math.floor(Math.random()*3);}
  function rollNext(){nextTier=rnd();nextObst=Math.random()<OBSTP;nextGolden=!nextObst&&Math.random()<GOLDP;}
  function pickTier(maxB){const w=feverActive?{3:46,4:32,5:22}:{3:36,4:34,5:30};
    const cnt={3:0,4:0,5:0};for(const r of requests)if(r.tier in cnt)cnt[r.tier]++;
    const pool=[];
    for(let t=3;t<=5;t++){if(blocksOf(t)<=maxB&&cnt[t]<2){for(let k=0;k<w[t];k++)pool.push(t);}}
    return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;}
  function makeReq(t,now){const b=blocksOf(t);const kind=Math.random()<0.6?'score':'time';
    const d=Math.round(durOf(b)*(feverActive?0.6:1)/0.7);
    return {tier:t,blocks:b,kind,dur:d,expire:now+d};}
  function usedBlocks(){return requests.reduce((s,r)=>s+r.blocks,0);}
  function fillRequests(now){let g=0,add=false;while(usedBlocks()<CAP&&g++<20){const t=pickTier(CAP-usedBlocks());if(t==null)break;requests.push(makeReq(t,now));add=true;}return add;}

  function setup(){
    renderChain();setFace('🐰');
    engine=Engine.create({enableSleeping:true});engine.gravity.y=0.42;
    engine.positionIterations=8;engine.velocityIterations=8;world=engine.world;
    const opt={isStatic:true,restitution:0.05,friction:0.6};
    Composite.add(world,[
      Bodies.rectangle(W/2,H+18,W,40,opt),
      Bodies.rectangle(-18,H/2,40,H*2,opt),
      Bodies.rectangle(W+18,H/2,40,H*2,opt)
    ]);
    bursts=[];parts=[];pops=[];score=0;combo=0;lastMerge=0;pointerX=W/2;canDrop=true;over=false;pending=[];begun=false;
    curTier=rnd();curObst=Math.random()<OBSTP;curGolden=!curObst&&Math.random()<GOLDP;rollNext();
    requests=[];fillRequests(performance.now());renderReqs();
    started=false;cdStart=performance.now();cdLast=-1;cdText='3';timeLeft=GAMETIME;lastSec=99;
    spurtOn=false;lastReact=0;lastCraving=0;burstCombo=0;resetFever();
    updateHud();
  }

  function resetFever(){feverActive=false;feverEnd=0;fulfillStreak=0;lastFulfillT=0;
    if(feverTimer){clearInterval(feverTimer);feverTimer=null;}
    document.getElementById('m-fever').style.display='none';
    document.getElementById('m-wrap').classList.remove('fever');}
  function startFever(now){feverActive=true;feverEnd=now+FEVERDUR;
    flash=1;flashCol='#ffd23f';shake=Math.max(shake,13);sFever();startFeverBGM();cutin('fever');
    pops.push({x:W/2,y:H*0.33,vy:-0.5,text:'🔥フィーバー！🔥',life:1.7,col:'#ff2d6f',size:29});
    pops.push({x:W/2,y:H*0.43,vy:-0.4,text:'5びょう ぜんとく2ばい！',life:1.7,col:'#ff8a2b',size:18});
    for(let k=0;k<3;k++)spawnBurst(W/2,H*0.4,30,9,PARTYCOL);
    document.getElementById('m-fever').style.display='inline-flex';
    document.getElementById('m-wrap').classList.add('fever');
    say('フィーバー〜！','🥳');}
  function endFever(){if(!feverActive)return;feverActive=false;
    if(feverTimer){clearInterval(feverTimer);feverTimer=null;}
    if(bgmFever)bgmFever.pause();if(!over&&started)playBGM();
    document.getElementById('m-fever').style.display='none';
    document.getElementById('m-wrap').classList.remove('fever');
    if(!over)say('もっと いける？','😊');}

  function addPiece(x,y,tier,vy,golden){
    const b=Bodies.circle(x,y,RAD[tier],{restitution:0.05,friction:0.55,frictionStatic:0.8,density:0.002,sleepThreshold:30});
    b.tier=tier;b.merged=false;b.golden=!!golden;b.bornAt=performance.now();if(vy)Body.setVelocity(b,{x:0,y:vy});
    Composite.add(world,b);return b;
  }
  function addObstacle(x,y){
    const bw=OBW,bh=OBH,br=bw*0.5;
    const opt={density:0.0022,restitution:0.04,friction:0.6,frictionStatic:0.9};
    const bowl=Bodies.circle(0,-bh*0.5+br,br,opt);
    const handle=Bodies.rectangle(0,bh*0.14,bw*0.42,bh*0.72,Object.assign({chamfer:{radius:bw*0.18}},opt));
    const b=Body.create({parts:[bowl,handle],sleepThreshold:28});
    Body.setPosition(b,{x,y});
    b.obst=true;b.tier='X';b.oh=OBH;b.bornAt=performance.now();
    Composite.add(world,b);return b;
  }
  function clampX(x,tier){const r=RAD[tier]+3;return Math.max(r,Math.min(W-r,x));}
  function clampObstX(x){return Math.max(OBW/2+3,Math.min(W-OBW/2-3,x));}

  function drop(){

  function renderReqs(){

  function tryFulfill(mt,x,y){
    const i=requests.findIndex(r=>r.tier===mt);if(i<0)return;
    const r=requests[i];const now=performance.now();
    flash=1;flashCol='#ffd23f';shake=Math.max(shake,9);sFulfill();scorePulse=1;
    if(r.kind==='score'){const add=Math.round(scoreOf(r.tier)*mult()*spurtMul());score+=add;
      pops.push({x:W/2,y:H*0.42,vy:-0.7,text:'やった！',life:1.3,col:'#ff2d6f',size:23});
      pops.push({x:W/2,y:H*0.52,vy:-0.5,text:'+'+add,life:1.3,col:'#ff8a2b',size:27});
    }else{const sec=timeOf(r.blocks);startT-=sec*1000;
      pops.push({x:W/2,y:H*0.42,vy:-0.7,text:'タイムボーナス！',life:1.3,col:'#13b0a3',size:21});
      pops.push({x:W/2,y:H*0.52,vy:-0.5,text:'+'+sec+'秒',life:1.3,col:'#13b0a3',size:27});}
    spawnBurst(W/2,H*0.45,40,7,PARTYCOL);spawnBurst(x,y,22,6,[COL[mt]]);
    requests.splice(i,1);fillRequests(now);renderReqs();
    fulfillStreak=(now-lastFulfillT<FEVERWIN)?fulfillStreak+1:1;lastFulfillT=now;
    const cb=Math.round(fulfillStreak*40*mult()*spurtMul());score+=cb;
    if(fulfillStreak>=2)pops.push({x:W/2,y:H*0.63,vy:-0.5,text:'チェイン×'+fulfillStreak+' +'+cb,life:1.1,col:'#b06bff',size:16});
    if(feverActive){say('やった〜！','😻');}
    else if(fulfillStreak>=3){startFever(now);fulfillStreak=0;}
    else if(fulfillStreak===2){say('あと1かいで フィーバー！','😳');sAnticip();
      pops.push({x:W/2,y:H*0.72,vy:-0.5,text:'あと1かいで フィーバー！',life:1.5,col:'#ff7a1a',size:18});}
    else say('やった〜！','😻');
  }

  function checkMerges(){
    const bs=Composite.allBodies(world).filter(b=>b.tier!=null&&!b.obst&&!b.merged);
    for(let i=0;i<bs.length;i++){const a=bs[i];
      if(Math.hypot(a.velocity.x,a.velocity.y)>=SETTLE)continue;
      for(let j=i+1;j<bs.length;j++){const b=bs[j];
        if(b.merged||a.tier!==b.tier||Math.hypot(b.velocity.x,b.velocity.y)>=SETTLE)continue;
        const dx=a.position.x-b.position.x,dy=a.position.y-b.position.y,rr=(RAD[a.tier]+RAD[b.tier])*1.0;
        if(dx*dx+dy*dy<=rr*rr){a.merged=b.merged=true;pending.push([a,b]);break;}}}
  }
  function spawnBurst(x,y,n,power,cols){
    for(let k=0;k<Math.round(n*0.5);k++){const a=Math.random()*Math.PI*2,sp=Math.random()*power+1.5;
      parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,size:Math.random()*3+2,col:cols[k%cols.length]});}
  }

  function doMerge(a,b){
    if(a.tier==null||a.obst||b.obst)return;
    const t=a.tier,nt=t+1,golden=(a.golden||b.golden),gmul=golden?3:1;
    const x=(a.position.x+b.position.x)/2,y=(a.position.y+b.position.y)/2;
    Composite.remove(world,a);Composite.remove(world,b);
    bursts.push({x,y,r0:RAD[t],life:1,col:golden?'#ffce2e':COL[t]});spawnBurst(x,y,7,4,[COL[t],'#fff']);
    const now=performance.now();
    combo=(now-lastMerge<900)?combo+1:1;lastMerge=now;if(combo===1)burstCombo=0;
    const gain=Math.round((nt+1)*10*combo*mult()*gmul);score+=gain;scorePulse=1;
    pops.push({x,y:y-RAD[t],vy:-0.6,text:'+'+gain,life:0.9,col:(golden||feverActive||combo>=3)?'#ff2d6f':'#7b86ff',size:13+Math.min(combo,6)});
    shake=Math.max(shake,1.5+Math.min(combo,5)*0.7);sMerge(t);
    if(combo>=5&&combo%5===0&&combo!==burstCombo){burstCombo=combo;
      const bb=Math.round(100*mult()*spurtMul());score+=bb;
      pops.push({x:W/2,y:H*0.62,vy:-0.55,text:'SWEET BURST！',life:1.4,col:'#ff2d6f',size:23});
      pops.push({x:W/2,y:H*0.71,vy:-0.5,text:'+'+bb,life:1.4,col:'#ff8a2b',size:21});
      flash=1;flashCol='#ffd23f';shake=Math.max(shake,10);sFever();}
    if(nt<EMOJI.length){const outT=(golden&&nt<EMOJI.length-1)?nt+1:nt;addPiece(x,y,outT,-2);tryFulfill(outT,x,y);}
    else{score+=Math.round(300*mult()*gmul);flash=1;shake=Math.max(shake,8);spawnBurst(x,y,30,7,PARTYCOL);}
    if(golden){startT-=5000;flash=1;flashCol='#ffe27a';shake=Math.max(shake,9);sGolden();
      spawnBurst(x,y,26,8,GOLDCOL.concat(['#fff']));
      pops.push({x,y:y-RAD[t]-15,vy:-0.6,text:'✨ゴールデン！',life:1.6,col:'#d99500',size:18});
      pops.push({x,y:y-RAD[t]+2,vy:-0.5,text:'×3 +5秒 とびこえ',life:1.5,col:'#d99500',size:13});}
    if(golden)say('ゴールデン〜！✨','🤩');
    else if(combo>=5)say('スイートバースト！','🤩');
    else if(combo>=4)say('×'+combo+'コンボ！','🤩');
    else if(combo>=2)say('れんさ〜！','😆');
    updateHud();
  }

  function checkOver(){
    const bodies=Composite.allBodies(world);const now=performance.now();
    for(const b of bodies){if(b.isStatic)continue;if(b.tier==null&&!b.obst)continue;
      if(now-b.bornAt<700)continue;
      const rr=b.obst?b.oh/2:RAD[b.tier];
      const top=b.position.y-rr;const slow=Math.hypot(b.velocity.x,b.velocity.y)<0.6;
      if(top<LINE&&slow){if(!b.overSince)b.overSince=now;else if(now-b.overSince>1100){gameOver('overflow');return;}}
      else b.overSince=0;
    }
  }
  function gameOver(kind){if(over)return;over=true;canDrop=false;endFever();stopBGM();playEnd();
    if(kind==='time'){document.getElementById('m-oemoji').textContent='🎉';
      document.getElementById('m-omsg').textContent='さいごまで あそべたね！';

    }else{document.getElementById('m-oemoji').textContent='🥲';
      document.getElementById('m-omsg').textContent='あふれちゃった〜 おしい！';

    const tt=titleOf(score);document.getElementById('m-otitle').textContent='🏅 Lv.'+tt.lv+' '+tt.name;
    document.getElementById('m-oscore').textContent=score;
    setTimeout(()=>{document.getElementById('m-overlay').style.display='flex';},(kind==='time'&&IMG['cutin_clear'])?700:0);
  }

  function setFace(f){const fe=document.getElementById('m-face');const key=MAID[f]||'normal';

    else{fe.classList.remove('hasimg');fe.style.backgroundImage='';fe.textContent=f;}}
  function say(t,f){lastReact=performance.now();document.getElementById('m-speech').textContent=t;setFace(f);}
  function updateHud(){document.getElementById('m-score').textContent=score;}
  function renderChain(){document.getElementById('m-chain').innerHTML=EMOJI.map((e,i)=>IMG['candy'+i]?'<img class="m-chimg" src="assets/candy_'+i+'.png" alt="">':'<span>'+e+'</span>').join('<span class="m-arrow">→</span>');}
  function updateFeverBadge(now){const el=document.getElementById('m-fever');
    if(feverActive){el.className='';el.textContent='🔥×2';el.style.display='inline-flex';return;}
    if(fulfillStreak>=2&&now-lastFulfillT<FEVERWIN){el.className='hint';el.textContent='🔥あと1！';el.style.display='inline-flex';}
    else{el.style.display='none';}}
  function maybeCrave(now){
    if(now-lastReact>2200&&now-lastCraving>4200&&requests.length){
      const r=requests[Math.floor(Math.random()*requests.length)];
      lastCraving=now;say('「'+(CRAVE[r.tier]||'たべたい！')+'」','🐰');}

  function updateCountdown(now){
    const e=(now-cdStart)/1000;
    if(e<3){const n=3-Math.floor(e);cdText=String(n);if(Math.floor(e)!==cdLast){cdLast=Math.floor(e);blip(1175,1560,0.14,'sine',0.1);}}
    else if(e<3.7){cdText='スタート！';if(cdLast!==9){cdLast=9;[0,4,7,12].forEach((m,k)=>blip(1175*Math.pow(2,m/12),1175*Math.pow(2,m/12)*1.12,0.16,'triangle',0.085,k*0.05));say('スタート〜！','😆');}}
    else{started=true;startT=performance.now();cdText='';say('どんどん おとしてね！','🐰');playBGM();}
  }
  function updateTimer(now){
    timeLeft=Math.max(0,GAMETIME-(now-startT)/1000);

    el.classList.toggle('low',timeLeft<=10);
    const s=Math.ceil(timeLeft);if(s!==lastSec){if(timeLeft<=5&&timeLeft>0)sTick();lastSec=s;}
    if(timeLeft<=10&&timeLeft>0&&!spurtOn){spurtOn=true;
      pops.push({x:W/2,y:H*0.5,vy:-0.4,text:'ラストスパート！',life:1.8,col:'#e8434f',size:25});
      pops.push({x:W/2,y:H*0.59,vy:-0.4,text:'ちゅうもん ほうしゅう2ばい！',life:1.8,col:'#ff8a2b',size:15});
      flash=1;flashCol='#ffd23f';shake=Math.max(shake,11);sFever();say('ラストスパート！','😤');}
    if(timeLeft<=0)gameOver('time');
  }
  function updateReqs(now){
    let dirty=false;
    for(let i=requests.length-1;i>=0;i--){if(now>=requests[i].expire){requests.splice(i,1);dirty=true;}}
    if(usedBlocks()<CAP&&fillRequests(now))dirty=true;
    if(dirty)renderReqs();
    for(let i=0;i<requests.length;i++){const bar=document.getElementById('m-bar-'+i);if(!bar)continue;
      const frac=Math.max(0,(requests[i].expire-now)/requests[i].dur);
      bar.style.width=(frac*100)+'%';bar.style.background=frac<0.3?'#ff8aa0':(frac<0.6?'#ffcf6b':'#7ddca4');}
  }

  function draw(now){
    const sx=(Math.random()-0.5)*shake*0.6,sy=(Math.random()-0.5)*shake*0.6;
    ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(sx,sy);
    if(started&&!over&&IMG['title']){const t=IMG['title'],ww=W*0.72,hh=ww*t.height/t.width;
      ctx.globalAlpha=0.09;ctx.drawImage(t,(W-ww)/2,H*0.44-hh/2,ww,hh);ctx.globalAlpha=1;}
    ctx.strokeStyle='rgba(255,120,160,.55)';ctx.setLineDash([6,6]);ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,LINE);ctx.lineTo(W,LINE);ctx.stroke();ctx.setLineDash([]);
    if(started&&!over){const gx=curObst?clampObstX(pointerX):clampX(pointerX,curTier);
      ctx.strokeStyle='rgba(255,150,190,.35)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(gx,LINE);ctx.lineTo(gx,H);ctx.stroke();
      if(curObst)drawObstacle(gx,LINE-5,0,.6);else drawPiece(gx,LINE-5,curTier,0,.55,curGolden);}
    const need={};
    for(const r of requests){const st=r.tier-1;if(st>=0&&!(st in need))need[st]=r.kind==='score'?'#ff3b5c':'#2f8bff';}
    for(const b of Composite.allBodies(world)){if(b.obst){drawObstacle(b.position.x,b.position.y,b.angle,1);continue;}
      if(b.tier==null)continue;
      const ac=need[b.tier];
      if(ac&&started&&!over){const pa=0.26+0.2*Math.sin(now/240),rr=RAD[b.tier];
        ctx.globalAlpha=pa;ctx.fillStyle=ac;ctx.beginPath();ctx.arc(b.position.x,b.position.y,rr*1.42,0,7);ctx.fill();
        ctx.globalAlpha=Math.min(0.85,pa+0.4);ctx.lineWidth=2.5;ctx.strokeStyle=ac;ctx.beginPath();ctx.arc(b.position.x,b.position.y,rr*1.22,0,7);ctx.stroke();ctx.globalAlpha=1;}
      drawPiece(b.position.x,b.position.y,b.tier,b.angle,1,b.golden);}
    for(let i=bursts.length-1;i>=0;i--){const p=bursts[i];p.life-=0.08;if(p.life<=0){bursts.splice(i,1);continue;}
      ctx.strokeStyle=p.col;ctx.globalAlpha=p.life;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r0*(1+(1-p.life)*1.5),0,7);ctx.stroke();ctx.globalAlpha=1;}
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.022;
      if(p.life<=0){parts.splice(i,1);continue;}
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();ctx.globalAlpha=1;}
    for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.y+=p.vy;p.life-=0.018;
      if(p.life<=0){pops.splice(i,1);continue;}
      ctx.globalAlpha=Math.min(1,p.life);ctx.font='700 '+p.size+'px '+FONT;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.lineWidth=Math.max(3,p.size*0.2);ctx.strokeStyle='rgba(255,255,255,.95)';ctx.lineJoin='round';ctx.strokeText(p.text,p.x,p.y);
      ctx.fillStyle=p.col;ctx.fillText(p.text,p.x,p.y);ctx.globalAlpha=1;}
    ctx.restore();
    if(feverActive){const a=0.06+0.04*Math.sin(now/80);ctx.fillStyle='rgba(255,200,40,'+a+')';ctx.fillRect(0,0,W,H);}
    if(started&&!over&&timeLeft<=10){const a=0.25+0.25*Math.sin(now/110);ctx.strokeStyle='rgba(232,67,79,'+a+')';
      ctx.lineWidth=8;rrect(4,4,W-8,H-8,12);ctx.stroke();}
    if(started&&!over&&!feverActive&&fulfillStreak>=2&&now-lastFulfillT<FEVERWIN){const a=0.3+0.35*Math.sin(now/120);
      ctx.strokeStyle='rgba(255,138,43,'+a+')';ctx.lineWidth=7;rrect(4,4,W-8,H-8,12);ctx.stroke();}
    if(!started&&!over){ctx.fillStyle='rgba(255,225,238,.9)';ctx.fillRect(0,0,W,H);
      if(IMG['title']){const t=IMG['title'],ww=W*0.9,hh=ww*t.height/t.width;ctx.drawImage(t,(W-ww)/2,H*0.32-hh/2,ww,hh);}
      ctx.fillStyle='#ff3d77';ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineJoin='round';ctx.strokeStyle='rgba(255,255,255,.95)';
      if(!begun){const s=0.55+0.45*Math.sin(now/300);ctx.globalAlpha=s;ctx.font='700 24px '+FONT;ctx.lineWidth=6;ctx.strokeText('タップでスタート♪',W/2,H*0.66);ctx.fillText('タップでスタート♪',W/2,H*0.66);ctx.globalAlpha=1;}
      else{const fs=cdText.length>2?44:96;ctx.font='700 '+fs+'px '+FONT;ctx.lineWidth=fs*0.16;ctx.strokeText(cdText,W/2,H*0.64);ctx.fillText(cdText,W/2,H*0.64);}}
    if(flash>0){ctx.globalAlpha=flash*0.22;ctx.fillStyle=flashCol;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
    shake*=0.86;if(shake<0.2)shake=0;flash*=0.86;if(flash<0.02)flash=0;
    if(scorePulse>0){const s=document.getElementById('m-score');s.style.transform='scale('+(1+scorePulse*0.3)+')';scorePulse*=0.8;if(scorePulse<0.02){scorePulse=0;s.style.transform='scale(1)';}}
  }
  function drawPiece(x,y,tier,ang,alpha,golden){
    const r=RAD[tier];ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.globalAlpha=alpha;
    const ci=IMG['candy'+tier];
    if(ci){ctx.drawImage(ci,-r,-r,r*2,r*2);}
    else{ctx.fillStyle=golden?'#ffe79a':COL[tier];ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();
      if(!golden){ctx.lineWidth=1.5;ctx.strokeStyle='rgba(150,108,124,.4)';ctx.stroke();}
      ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(-r*0.32,-r*0.34,r*0.22,0,7);ctx.fill();
      ctx.globalAlpha=alpha;ctx.font=(r*1.2)+'px '+FONT;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(EMOJI[tier],0,r*0.06);}
    if(golden){ctx.lineWidth=3;ctx.strokeStyle='#ffb800';ctx.beginPath();ctx.arc(0,0,r-1.5,0,7);ctx.stroke();
      ctx.font=(r*0.7)+'px '+FONT;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✨',r*0.5,-r*0.55);}
    ctx.restore();ctx.globalAlpha=1;
  }
  function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function drawObstacle(x,y,ang,alpha){
    const w=OBW,h=OBH;ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.globalAlpha=alpha;
    const si=IMG['spoon'];
    if(si){ctx.drawImage(si,-w/2,-h/2,w,h);}
    else{rrect(-w/2,-h/2,w,h,Math.min(w,h)*0.26);ctx.fillStyle='#ece8f2';ctx.fill();
      ctx.lineWidth=2;ctx.strokeStyle='#c2bcd2';ctx.stroke();
      const sw=w*0.5,sh=h*0.72;ctx.strokeStyle='#9aa0b8';ctx.lineWidth=1.6;
      ctx.fillStyle='#cfd3e2';rrect(-sw*0.22,-sh*0.04,sw*0.44,sh*0.5,sw*0.22);ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.ellipse(0,-sh*0.27,sw*0.5,sh*0.22,0,0,7);ctx.fillStyle='#dfe3f0';ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.ellipse(-sw*0.14,-sh*0.31,sw*0.2,sh*0.08,0,0,7);ctx.fillStyle='#f6f7fc';ctx.fill();}
    ctx.restore();ctx.globalAlpha=1;
  }

  function loop(){
    const now=performance.now();
    if(!over){
      if(!begun){}
      else if(!started){updateCountdown(now);}
      else{Engine.update(engine,1000/60);checkMerges();
        while(pending.length){const[a,b]=pending.pop();doMerge(a,b);}
        if(Composite.allBodies(world).filter(x=>x.obst).length>=3)clearObstacles();
        if(feverActive&&now>=feverEnd)endFever();
        updateTimer(now);updateReqs(now);updateFeverBadge(now);maybeCrave(now);checkOver();}
    }
    draw(now);requestAnimationFrame(loop);
  }

  function px(e){const r=cv.getBoundingClientRect();return (e.clientX-r.left)*(W/r.width);}
  cv.addEventListener('pointermove',e=>{pointerX=px(e);});
  cv.addEventListener('pointerdown',e=>{const c=actx();if(c&&c.state==='suspended')c.resume();
    if(!begun&&!over){begun=true;cdStart=performance.now();cdLast=-1;return;}
    playBGM();pointerX=px(e);drop();});
  document.getElementById('m-again').addEventListener('click',()=>{
    stopBGM();if(bgmEnd)bgmEnd.pause();
    Composite.allBodies(world).filter(b=>b.tier!=null).forEach(b=>Composite.remove(world,b));
    document.getElementById('m-overlay').style.display='none';
    over=false;score=0;combo=0;canDrop=true;pending=[];begun=true;
    curTier=rnd();curObst=Math.random()<OBSTP;curGolden=!curObst&&Math.random()<GOLDP;rollNext();
    parts=[];pops=[];bursts=[];requests=[];fillRequests(performance.now());renderReqs();
    started=false;cdStart=performance.now();cdLast=-1;cdText='3';timeLeft=GAMETIME;lastSec=99;
    spurtOn=false;lastReact=0;lastCraving=0;burstCombo=0;resetFever();
    say('よ〜い…！','🐰');updateHud();});

  function fit(){const s=document.getElementById('m-stage');if(!s)return;s.style.transform='scale(1)';
    const h=s.offsetHeight,w=s.offsetWidth;
    const sc=Math.min(1,(window.innerHeight-8)/h,(window.innerWidth-4)/w);
    s.style.transform='scale('+sc+')';}
  window.addEventListener('resize',fit);window.addEventListener('load',fit);
  setTimeout(fit,400);

  setup();loop();fit();
})();
